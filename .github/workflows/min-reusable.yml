name: Min Reusable
on:
  workflow_call:
    inputs:
      lane:
        required: true
        type: string
    secrets:
      GH_PAT:
        required: true
permissions:
  contents: read
  actions: read
jobs:
  ping:
    runs-on: ubuntu-latest
    concurrency:
      group: brain-sync-${{ inputs.lane }}
      cancel-in-progress: false
    steps:
      - run: echo "lane=${{ inputs.lane }} has_secret=${{ secrets.GH_PAT != '' }}"
